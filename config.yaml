baseurl:                 https://colinbarker.me.uk/
languageCode:            en-gb
title:                   Colin Barker
theme:                   hugo-theme-stack
timeout:                 120s
DefaultContentLanguage: "en"
hasCJKLanguage:         false
disqusShortname         : ""
googleAnalytics         : ""

pagination:
    pagerSize: 5

permalinks:
    post: /blog/:slug/
    page: /:slug/

params:
    mainSections:
        - blog
    rssFullContent: true

    footer:
        since: 2020
        customText:

    dateFormat:
        published: ":date_full"
        lastUpdated: ":date_full"

    sidebar:
        compact: false
        emoji: 
        subtitle: Head of AWS & Managing Consultant, AWS Ambassador, AWS Certification Lead Subject Matter Expert (CLSME), AWS Community Builder, and Chairman of Tokonatsu, a Japanese Culture Festival.
        avatar: /img/profile_pic.jpg

    widgets:
        homepage:
            - type: search
            - type: archives
              params:
                  limit: 5
            - type: categories
              params:
                  limit: 10
            - type: tag-cloud
              params:
                  limit: 10
        page:
            - type: toc

    article:
        headingAnchor: false
        math: false
        toc: true
        readingTime: true
        list:
            showTags: false
        license:
            enabled: false
            default: "Licensed under CC BY-NC-SA 4.0"

    colorScheme:
        toggle: true
        default: auto

    imageProcessing:
        autoOrient: false
        external:
            timeout: "10s"
        content:
            widths: [800, 1600, 2400]
            enabled: true
        thumbnail:
            enabled: true

markup:
    goldmark:
        renderer:
            ## Set to true if you have HTML content inside Markdown
            unsafe: false
    tableOfContents:
        endLevel: 4
        ordered: true
        startLevel: 2
    highlight:
        noClasses: false
        codeFences: true
        guessSyntax: true
        lineNoStart: 1
        lineNos: true
        lineNumbersInTable: true
        tabWidth: 4

### Custom menu
### See https://docs.stack.jimmycai.com/configuration/custom-menu.html
### To remove about, archive and search page menu item, remove `menu` field from their FrontMatter
menu:
    main: []

    social:
        - identifier: github
          name: GitHub
          url: https://github.com/mystcb
          params:
              icon: brand-github

        - identifier: bluesky
          name: Bluesky
          url: https://bsky.app/profile/faereal.net
          params:
              icon: brand-bluesky 

        # - identifier: flickr
        #   name: Twitter
        #   url: https://flickr.com/photos/mystcb
        #   params:
        #       icon: brand-flickr   

        - identifier: linkedin
          name: LinkedIn
          url: https://linkedin.com/in/colinbarker
          params:
              icon: brand-linkedin

        - identifier: facebook
          name: Facebook
          url: https://facebook.com/mystcb
          params:
              icon: brand-facebook

        - identifier: instagram
          name: Instagram
          url: https://instagram.com/mystcb
          params:
              icon: brand-instagram

        - identifier: youtube
          name: YouTube
          url: https://youtube.com/mystcb
          params:
              icon: brand-youtube

        - identifier: mastadon
          name: Mastadon
          url: https://tokonatsu.social/@myst
          params:
              icon: brand-mastodon